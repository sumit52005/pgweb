name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build Backend Image
      - name: Build Backend Image
        run: docker build -t sumit52005/pg-backend ./backend

      # 4. Push Backend Image
      - name: Push Backend Image
        run: docker push sumit52005/pg-backend

      # 5. Build Frontend Image
      - name: Build Frontend Image
        run: docker build -t sumit52005/pg-frontend ./frontend

      # 6. Push Frontend Image
      - name: Push Frontend Image
        run: docker push sumit52005/pg-frontend